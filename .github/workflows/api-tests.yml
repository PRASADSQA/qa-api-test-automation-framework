env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Run API Tests

on:
  push:
    branches:
      - main

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Run API tests with environment
        run: |
          newman run collection.json -e qa-env.json -r html --reporter-html-export report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: report.html
